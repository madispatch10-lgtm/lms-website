<!DOCTYPE html>
<html>
<head>
<title>Pro LMS</title>
<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{background:#2563eb;}

.hidden{display:none;}

.question{
background:#1f2937;
padding:10px;
margin:10px 0;
border-radius:8px;
text-align:left;
}
</style>
</head>

<body>

<div class="header">🚀 Professional LMS</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginPage">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">
<h2>Select Course</h2>
<button onclick="openCourse('sales')">📈 Sales Training</button>
<button onclick="openCourse('dispatch')">🚚 Dispatch Training</button>
</div>

<!-- COURSE -->
<div class="card hidden" id="coursePage">
<h2 id="courseTitle"></h2>
<div id="content"></div>
<button onclick="startQuiz()">Take Test</button>
</div>

<!-- QUIZ -->
<div class="card hidden" id="quizPage">
<h2>Quiz</h2>
<div id="questions"></div>
<button onclick="submitQuiz()">Submit</button>
</div>

</div>

<script>

const courses = {
sales: `
<h3>Sales Training</h3>
<p>Sales ka main purpose client ko convince karna hota hai.</p>
<p>Cold calling ka matlab hota hai naye clients ko call karna.</p>
<p>Closing ka matlab deal finalize karna hota hai.</p>
<p>Good communication sab se important skill hai.</p>
`,

dispatch: `
<h3>Dispatch Training</h3>
<p>Dispatching ka matlab trucks aur loads manage karna hai.</p>
<p>Brokers ke sath communication zaroori hoti hai.</p>
<p>Load booking aur rate negotiation main kaam hai.</p>
<p>Time management aur follow-up important hai.</p>
`
};

const quiz = {
sales:[
{q:"Cold calling kya hai?",options:["Calling clients","Driving","Email"],a:0},
{q:"Closing ka matlab?",options:["End deal","Start","Ignore"],a:0}
],

dispatch:[
{q:"Dispatch kya hai?",options:["Truck management","Cooking","Gaming"],a:0},
{q:"Broker kya karta hai?",options:["Connect loads","Drive","Sleep"],a:0}
]
};

let currentCourse="";

function login(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
}

function openCourse(type){
currentCourse = type;

document.getElementById("dashboard").classList.add("hidden");
document.getElementById("coursePage").classList.remove("hidden");

document.getElementById("courseTitle").innerText = type.toUpperCase()+" COURSE";
document.getElementById("content").innerHTML = courses[type];
}

function startQuiz(){
document.getElementById("coursePage").classList.add("hidden");
document.getElementById("quizPage").classList.remove("hidden");

let html="";
quiz[currentCourse].forEach((q,i)=>{
html += `<div class="question">${q.q}<br>`;
q.options.forEach((opt,j)=>{
html += `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
});
html += `</div>`;
});

document.getElementById("questions").innerHTML = html;
}

function submitQuiz(){
let correct = 0;

quiz[currentCourse].forEach((q,i)=>{
let ans = document.querySelector(`input[name="q${i}"]:checked`);
if(ans && parseInt(ans.value)===q.a){correct++;}
});

alert("Result: "+correct+" / "+quiz[currentCourse].length);
location.reload();
}

</script>

</body>
</html>
