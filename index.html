<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HOBYO Training Portal PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0b1220;color:#e5e7eb}
.hero{padding:80px;text-align:center;background:linear-gradient(135deg,#020617,#111827,#1e293b)}
.hero h1{font-size:42px}
.hero h2{color:#38bdf8}
.btn-main{margin-top:30px;padding:14px 30px;border:none;border-radius:12px;background:#2563eb;color:white;cursor:pointer}
.container{display:flex}
.sidebar{width:260px;background:#020617;height:100vh;padding:20px;overflow:auto}
.sidebar button{width:100%;margin:6px 0;padding:12px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:600;cursor:pointer}
.main{flex:1;padding:30px}
.card{background:#020617;padding:30px;border-radius:16px;line-height:1.8}
.hidden{display:none}
</style>
</head>
<body>

<div id="loginPage" class="hero">
<h1>HOBYO FREIGHT DISPATCHERS</h1>
<h2>TRAINING PORTAL</h2>
<p>Complete professional training system for US trucking dispatch & sales industry.</p>
<button class="btn-main" onclick="enterApp()">Enter Training</button>
</div>

<div id="app" class="hidden">
<div class="container">
<div class="sidebar" id="sidebar">
<h3>Modules</h3>
<div id="modules"></div>
</div>

<div class="main">
<div id="home" class="card">
<h2>Select Training</h2>
<button class="btn-main" onclick="loadCourse('sales')">Sales Training</button>
<button class="btn-main" onclick="loadCourse('dispatch')">Dispatch Training</button>
</div>

<div id="content" class="card hidden"></div>

<div style="margin-top:20px;display:flex;justify-content:space-between;">
<button onclick="prevModule()">Previous</button>
<span id="progressText"></span>
<button onclick="nextModule()">Next</button>
</div>

</div></div></div>

<script>
function enterApp(){loginPage.style.display='none';app.classList.remove('hidden');}

const longPara = (title)=>`<h1>${title}</h1>
<p>This section provides deep professional explanation used in real US trucking industry. A dispatcher or sales agent must understand every step carefully. This includes communication, documentation, workflow handling, negotiation, and relationship building. Every process requires attention to detail, accuracy, and consistency.</p>
<p>In real operations, mistakes can cause financial loss, delays, or even cancellation of loads. That is why each step must be handled professionally. A good dispatcher or salesperson always double checks information before proceeding.</p>
<p>Understanding real workflow is important. From onboarding to load booking to delivery and payment, everything follows a structured process. This process must be learned and applied correctly.</p>
<p>Communication plays a key role. Whether dealing with brokers, carriers, or drivers, clarity and professionalism are required. Miscommunication can lead to serious issues.</p>
<p>Time management is also critical. A dispatcher handles multiple tasks at once including calls, tracking, and coordination. Efficiency improves profit.</p>
<p>Consistency builds trust. When you perform tasks correctly every day, brokers and carriers rely on you. This creates long term business relationships.</p>
<p>In summary, this is not just a simple job, it is a full operational responsibility that requires skill, focus, and continuous improvement.</p>`;

const data={

sales:[
...Array(10).fill(0).map((_,i)=>`<h3>Module ${i+1}</h3><p>This sales module explains important concept of sales in trucking industry with professional approach.</p><p>You learn communication, trust building, and closing techniques.</p><p>Each step improves your performance.</p><p>Practice daily to get better results.</p><p>Consistency is key.</p><p>Handle clients professionally.</p><p>Build relationships.</p><p>Close deals effectively.</p>`),

longPara("Complete Sales Workflow"),
longPara("Document Collection & Carrier Onboarding"),
longPara("Advanced Sales Psychology"),
longPara("Real Sales Conversation Example"),
longPara("Follow-Up Strategy Deep Guide"),
longPara("Closing Techniques Mastery"),
longPara("Objection Handling Real Scenarios"),
longPara("High Ticket Closing Strategy"),
longPara("Final Sales Script (Full Call Flow)")
],

dispatch:[
...Array(10).fill(0).map((_,i)=>`<h3>Module ${i+1}</h3><p>This dispatch module explains real dispatch workflow in trucking industry.</p><p>You learn load booking, communication, and tracking.</p><p>Each concept builds your skill.</p><p>Understand process clearly.</p><p>Reduce mistakes.</p><p>Improve efficiency.</p><p>Handle drivers and brokers.</p><p>Maximize profit.</p>`),

longPara("Full Dispatching Explanation"),
longPara("Advanced Load Booking Process"),
longPara("Broker Negotiation Full Guide"),
longPara("Carrier Packet Detailed Explanation"),
longPara("Broker Carrier Agreement (Full Understanding)"),
longPara("Daily Dispatcher Workflow"),
longPara("Common Dispatcher Mistakes"),
longPara("Payment & Invoice System"),
longPara("Final Dispatch Call Script")
]
};

let current="";
let index=0;

function loadCourse(type){
current=type;
home.classList.add('hidden');
content.classList.remove('hidden');
renderModules();
show(0);
}

function renderModules(){
let html="";
for(let i=0;i<10;i++) html+=`<button onclick='show(${i})'>Module ${i+1}</button>`;
modules.innerHTML=html;
}

function show(i){
index=i;
let item=data[current][i];
if(i>=10){sidebar.style.display='none';}
else{sidebar.style.display='block';}
content.innerHTML=item;
progressText.innerText=`Step ${i+1} of ${data[current].length}`;
}

function nextModule(){if(index<data[current].length-1)show(index+1)}
function prevModule(){if(index>0)show(index-1)}

</script>
</body>
</html>
