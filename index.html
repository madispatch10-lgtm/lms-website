<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite LMS System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:white}
.header{background:#020617;padding:15px 30px;font-size:20px;font-weight:600}
.container{display:flex}
.sidebar{width:260px;background:#020617;height:calc(100vh - 60px);padding:20px;overflow:auto}
.sidebar button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px;background:#1e293b;color:white;text-align:left;cursor:pointer}
.sidebar button:hover{background:#334155}
.main{flex:1;padding:30px}
.card{background:#020617;padding:25px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.4)}
button.primary{background:#38bdf8;color:black;border:none;padding:12px;border-radius:8px;margin-top:15px;cursor:pointer;font-weight:bold}
button.primary:hover{background:#0ea5e9}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">🚀 Elite LMS Professional</div>

<div id="loginPage" class="main">
<div class="card">
<h2>Login</h2>
<input placeholder="Email" style="width:100%;padding:10px;margin:8px 0">
<input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0">
<button class="primary" onclick="enterApp()">Login</button>
</div>
</div>

<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<h3>Modules</h3>
<div id="modules"></div>
<button onclick="backHome()">⬅ Back</button>
</div>

<div class="main">
<div id="home" class="card">
<h2>Select Course</h2>
<button class="primary" onclick="loadCourse('sales')">Sales Training</button>
<button class="primary" onclick="loadCourse('dispatch')">Dispatch Training</button>
</div>

<div id="content" class="card hidden"></div>
<div id="quiz" class="card hidden"></div>
</div>

</div>
</div>

<script>

const data={

sales:[
"<h3>Intro to Sales</h3><p>Sales is about solving problems, building trust, and delivering value. A strong salesperson understands customer needs and communicates clearly. Confidence and consistency drive success. Listening is more important than speaking. Always focus on long-term relationships instead of short-term gains. Professionalism increases credibility. A structured process improves results. Follow-ups are critical in closing deals.</p>",
"<h3>Cold Calling</h3><p>Cold calling is reaching new clients. A strong opening is essential. Keep your message clear and short. Confidence builds trust. Always respect the client’s time. Handle rejection professionally. Practice daily. Track performance. Improve scripts continuously.</p>",
"<h3>Closing</h3><p>Closing means finalizing a deal. Use urgency and clarity. Guide the customer. Remove confusion. Be confident when asking for sale. Offer next steps. Keep it simple. Follow up if needed. Strong closing increases revenue.</p>"
],

dispatch:[
"<h3>Intro Dispatch</h3><p>Dispatching connects brokers and carriers. It manages loads, routes, and drivers. Strong communication is required. Planning reduces deadhead. Good decisions increase profit. Always track loads. Maintain records. Build broker relationships.</p>",
"<h3>Load Boards</h3><p>Load boards like DAT help find loads. Filter properly. Check RPM. Call brokers professionally. Confirm all details. Negotiate rates. Avoid bad brokers. Choose profitable loads.</p>",
"<h3>Documents</h3><p>BOL, POD, Rate Confirmation are essential. W9 and COI verify identity. MC authority is license. TONU is cancellation fee. Always verify documents before dispatching.</p>"
]
};

const quizzes={
sales:[
{q:"Sales is about?",o:["Value","Force","Ignore"],a:0},
{q:"Cold calling means?",o:["New clients","Old","None"],a:0}
],

dispatch:[
{q:"Dispatch connects?",o:["Broker & carrier","None","Shop"],a:0},
{q:"RPM means?",o:["Rate per mile","Fuel","Speed"],a:0}
]
};

let current="";
let i=0;

function enterApp(){loginPage.style.display='none';app.classList.remove('hidden');}

function loadCourse(type){
current=type;i=0;
home.classList.add('hidden');
content.classList.remove('hidden');
renderModules();
showContent();
}

function renderModules(){
let html="";
data[current].forEach((_,index)=>{
html+=`<button onclick='go(${index})'>Module ${index+1}</button>`;
});
html+=`<button onclick='startQuiz()'>Take Test</button>`;
modules.innerHTML=html;
}

function showContent(){content.innerHTML=data[current][i];}
function go(index){i=index;showContent();}

function startQuiz(){
content.classList.add('hidden');
quiz.classList.remove('hidden');
let html="";
quizzes[current].forEach((q,idx)=>{
html+=`<p>${q.q}</p>`;
q.o.forEach((opt,j)=>{html+=`<label><input type='radio' name='q${idx}' value='${j}'> ${opt}</label><br>`});
});
quiz.innerHTML=html+"<br><button class='primary' onclick='submitQuiz()'>Submit</button>";
}

function submitQuiz(){
let score=0;
quizzes[current].forEach((q,idx)=>{
let ans=document.querySelector(`input[name=q${idx}]:checked`);
if(ans && ans.value==q.a)score++;
});
alert("Score: "+score);
location.reload();
}

function backHome(){location.reload();}

</script>

</body>
</html>
