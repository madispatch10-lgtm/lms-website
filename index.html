<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Ultimate Pro Final</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:#e5e7eb;
}

.topbar{
background:#0a0f1a;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin:10px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

input{background:#0b1220;color:white;}
button{background:#3b82f6;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#2563eb;}

.hidden{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.courseBox{
background:#0b1220;
padding:15px;
border-radius:12px;
cursor:pointer;
}

.courseBox:hover{background:#1f2937;}

.module{
background:#0b1220;
padding:12px;
border-radius:10px;
margin:10px 0;
}

.lesson{
background:#111827;
padding:10px;
margin:6px 0;
border-radius:8px;
cursor:pointer;
}

.lesson:hover{background:#1f2937;}

#videoModal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
}

.videoBox{
background:#111827;
padding:20px;
border-radius:12px;
width:90%;
max-width:800px;
}

iframe{
width:100%;
height:400px;
border-radius:10px;
}

.progress{
height:10px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin:10px 0;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
}
</style>
</head>
<body>

<div class="topbar">
<h2>🚀 LMS Final Pro</h2>
<span id="userStatus">Guest</span>
</div>

<!-- LOGIN -->
<div class="container" id="loginBox">
<div class="card">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">
<div class="card">
<h2>Courses</h2>
<div class="grid">
<div class="courseBox" onclick="openCourse('sales')">📈 Sales Training</div>
<div class="courseBox" onclick="openCourse('dispatch')">🚚 Dispatch Training</div>
</div>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<p>Progress</p>

<button onclick="logout()" style="background:#ef4444">Logout</button>
</div>
</div>

<!-- COURSE -->
<div class="container hidden" id="coursePage">
<div class="card">
<h2 id="courseTitle"></h2>
<div id="modules"></div>
<button onclick="back()">Back</button>
</div>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="hidden" onclick="closeVideo()">
<div class="videoBox" onclick="event.stopPropagation()">
<h3 id="videoTitle"></h3>
<iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
<button onclick="closeVideo()">Close</button>
</div>
</div>

<script>
let currentCourse="";
let progress=0;

const data={
sales:[
{module:"Basics",lessons:[
{name:"Intro to Sales",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
{name:"Cold Calling",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
]},
{module:"Advanced",lessons:[
{name:"Closing Deals",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
{name:"Negotiation",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
]}
],
dispatch:[
{module:"Intro",lessons:[
{name:"What is Dispatch",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
{name:"Load Boards",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
]},
{module:"Operations",lessons:[
{name:"Broker Calls",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
{name:"Rate Negotiation",video:"https://www.youtube.com/embed/dQw4w9WgXcQ"}
]}
]
};

function login(){
loginBox.classList.add('hidden');
dashboard.classList.remove('hidden');
userStatus.innerText=email.value;
}

function logout(){location.reload();}

function openCourse(type){
currentCourse=type;
dashboard.classList.add('hidden');
coursePage.classList.remove('hidden');
courseTitle.innerText=type.toUpperCase()+" COURSE";

let html="";
data[type].forEach(m=>{
html+=`<div class='module'><h3>📁 ${m.module}</h3>`;
m.lessons.forEach(l=>{
html+=`<div class='lesson' onclick='openVideo("${l.name}","${l.video}")'>🎥 ${l.name}</div>`;
});
html+=`</div>`;
});

modules.innerHTML=html;
}

function back(){
coursePage.classList.add('hidden');
dashboard.classList.remove('hidden');
}

function openVideo(name,video){
videoModal.classList.remove('hidden');
videoTitle.innerText=name;
videoFrame.src=video;
progress+=10;
if(progress>100)progress=100;
document.getElementById('progressBar').style.width=progress+"%";
}

function closeVideo(){
videoModal.classList.add('hidden');
videoFrame.src="";
}
</script>

</body>
</html>
