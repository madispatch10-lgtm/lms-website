<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite LMS (No Firebase)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Outfit',sans-serif;background:#0b1220;color:#e2e8f0}
.header{padding:15px 30px;background:#020617;font-size:20px}
.container{display:flex}
.sidebar{width:260px;background:#020617;height:100vh;padding:20px}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:#1e293b;color:white;border:none;border-radius:8px;cursor:pointer}
.main{flex:1;padding:30px}
.card{background:#020617;padding:25px;border-radius:14px}
.primary{background:#38bdf8;color:black;padding:10px;border:none;border-radius:8px;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">🚀 Elite LMS</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="main">
<div class="card">
<h2>Login</h2>
<input placeholder="Email"><br><br>
<input type="password" placeholder="Password"><br><br>
<button class="primary" onclick="enterApp()">Enter</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<h3>Modules</h3>
<div id="modules"></div>
<button onclick="goHome()">⬅ Back</button>
</div>

<div class="main">
<div id="home" class="card">
<h2>Select Course</h2>
<button class="primary" onclick="loadCourse('sales')">Sales Training</button>
<button class="primary" onclick="loadCourse('dispatch')">Dispatch Training</button>
</div>

<div id="content" class="card hidden"></div>
<div id="quiz" class="card hidden"></div>
</div>

</div>
</div>

<script>

function enterApp(){
loginPage.style.display='none';
app.classList.remove('hidden');
}

function goHome(){location.reload();}

const data={

sales:[
"<h3>1. Sales Intro</h3><p>Sales is about solving problems and building trust with customers. Always understand needs first.</p>",
"<h3>2. Customer Psychology</h3><p>Customers buy emotionally. Identify pain points and connect.</p>",
"<h3>3. Cold Calling</h3><p>Hi this is [Name], are you open for quick discussion?</p>",
"<h3>4. Objections</h3><p>Handle calmly and logically.</p>",
"<h3>5. Closing</h3><p>Ask confidently to close deal.</p>",
"<h3>6. Follow Up</h3><p>Most deals close on follow up.</p>",
"<h3>7. Funnel</h3><p>Lead → Close → Retain</p>",
"<h3>8. Growth</h3><p>Practice daily and improve.</p>",
"<h3>9. High Ticket</h3><p>Focus on value not price.</p>",
"<h3>10. Scaling</h3><p>Build systems and team.</p>"
],

dispatch:[
"<h3>1. Dispatch Intro</h3><p>Dispatch connects brokers and carriers.</p>",
"<h3>2. Load Boards</h3><p>Use DAT to find loads.</p>",
"<h3>3. Booking</h3><p>Call broker and confirm details.</p>",
"<h3>4. Negotiation</h3><p>Get best rate possible.</p>",
"<h3>5. Deadhead</h3><p>Reduce empty miles.</p>",
"<h3>6. Documents</h3><p>BOL, POD important.</p>",
"<h3>7. Trucks</h3><p>Dry Van, Reefer etc.</p>",
"<h3>8. Payment</h3><p>Zelle, PayPal etc.</p>",
"<h3>9. Broker Check</h3><p>Avoid bad brokers.</p>",
"<h3>10. Workflow</h3><p>Find → Call → Book → Deliver</p>"
]
};

const quizzes={
sales:[
{q:"Sales is about?",o:["Value","Force"],a:0},
{q:"Follow up?",o:["Important","No"],a:0}
],

dispatch:[
{q:"RPM?",o:["Rate per mile","Speed"],a:0},
{q:"Deadhead?",o:["Empty miles","Loaded"],a:0}
]
};

let current="";

function loadCourse(type){
current=type;
home.classList.add('hidden');
content.classList.remove('hidden');
renderModules();
show(0);
}

function renderModules(){
let html="";
data[current].forEach((_,i)=>{
html+=`<button onclick='show(${i})'>Module ${i+1}</button>`;
});
html+=`<button onclick='startQuiz()'>Take Test</button>`;
modules.innerHTML=html;
}

function show(i){content.innerHTML=data[current][i];}

function startQuiz(){
content.classList.add('hidden');
quiz.classList.remove('hidden');
let html="";
quizzes[current].forEach((q,i)=>{
html+=`<p>${q.q}</p>`;
q.o.forEach((opt,j)=>{
html+=`<label><input type='radio' name='q${i}' value='${j}'> ${opt}</label><br>`;
});
});
quiz.innerHTML=html+"<br><button class='primary' onclick='submitQuiz()'>Submit</button>";
}

function submitQuiz(){
let score=0;
quizzes[current].forEach((q,i)=>{
let ans=document.querySelector(`input[name=q${i}]:checked`);
if(ans && ans.value==q.a)score++;
});
alert("Score: "+score);
location.reload();
}

</script>

</body>
</html>
