<!DOCTYPE html>
<html>
<head>
<title>LMS Pro Chapters</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0;}
.header{background:#111827;padding:15px;text-align:center;font-size:22px;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:#111827;padding:25px;border-radius:12px;margin-top:20px;line-height:1.7;}
button{padding:12px;margin:8px 0;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer;width:100%;}
button:hover{background:#2563eb;}
.hidden{display:none;}
.question{background:#1f2937;padding:12px;margin:10px 0;border-radius:8px;}
.navBtns{display:flex;gap:10px;}
</style>
</head>
<body>

<div class="header">🚀 LMS Pro Advanced</div>

<div class="container">

<div class="card" id="loginPage">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div class="card hidden" id="dashboard">
<h2>Select Course</h2>
<button onclick="startCourse('sales')">📈 Sales Training</button>
<button onclick="startCourse('dispatch')">🚚 Dispatch Training</button>
</div>

<div class="card hidden" id="coursePage">
<h2 id="courseTitle"></h2>
<div id="chapterContent"></div>
<div class="navBtns">
<button onclick="prevChapter()">Previous</button>
<button onclick="nextChapter()">Next</button>
</div>
<button onclick="startQuiz()">Take Test</button>
</div>

<div class="card hidden" id="quizPage">
<h2>Quiz</h2>
<div id="questions"></div>
<button onclick="submitQuiz()">Submit</button>
</div>

</div>

<script>

const courses={
sales:[
"<h3>Chapter 1: Introduction to Sales</h3><p>Sales is the art of understanding customer needs and offering solutions that create value. A professional salesperson focuses on building trust rather than pushing products.</p><p>Successful salespeople analyze problems, listen carefully, and position their offer as the best solution.</p>",
"<h3>Chapter 2: Customer Psychology</h3><p>Customers buy based on emotion and justify with logic. Understanding fear, desire, and urgency is critical.</p><p>Always identify pain points and show how your solution removes that pain.</p>",
"<h3>Chapter 3: Communication Skills</h3><p>Communication is the backbone of sales. Speak clearly, confidently, and avoid complex language.</p><p>Listening is more important than speaking. Ask questions and understand before pitching.</p>",
"<h3>Chapter 4: Cold Calling</h3><p>Cold calling is reaching out to new prospects. Use a strong opening, introduce yourself quickly, and explain value.</p><p>Confidence and tone matter more than script.</p>",
"<h3>Chapter 5: Handling Objections</h3><p>Objections are part of the process. Stay calm and respond logically.</p><p>Common objections include price, trust, and timing.</p>",
"<h3>Chapter 6: Closing Deals</h3><p>Closing is converting a lead into a paying client. Use urgency and clarity.</p><p>Always guide the client toward a decision.</p>",
"<h
]
};

const quiz={
sales:[
{q:"Sales is about?",options:["Solving problems","Forcing","Ignoring"],a:0},
{q:"Cold calling means?",options:["New clients","Old","None"],a:0},
{q:"Closing means?",options:["Final deal","Start","End"],a:0}
],

dispatch:[
{q:"Dispatching involves?",options:["Managing trucks","Cooking","Gaming"],a:0},
{q:"Load boards used for?",options:["Loads","Videos","Chat"],a:0}
]
};

let currentCourse="";
let currentIndex=0;

function login(){
document.getElementById('loginPage').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
}
function startCourse(type){
currentCourse=type;
currentIndex=0;
dashboard.classList.add('hidden');
coursePage.classList.remove('hidden');
courseTitle.innerText=type.toUpperCase()+" COURSE";
loadChapter();
}

function loadChapter(){
chapterContent.innerHTML=courses[currentCourse][currentIndex];
}

function nextChapter(){
if(currentIndex<courses[currentCourse].length-1){currentIndex++;loadChapter();}
}

function prevChapter(){
if(currentIndex>0){currentIndex--;loadChapter();}
}

function startQuiz(){
coursePage.classList.add('hidden');
quizPage.classList.remove('hidden');
let html="";
quiz[currentCourse].forEach((q,i)=>{
html+=`<div class="question">${q.q}<br>`;
q.options.forEach((opt,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
});
html+=`</div>`;
});
questions.innerHTML=html;
}

function submitQuiz(){
let correct=0;
quiz[currentCourse].forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);
if(ans && parseInt(ans.value)===q.a){correct++;}
});
alert("Result: "+correct+" / "+quiz[currentCourse].length);
location.reload();
}

</script>

</body>
</html>
