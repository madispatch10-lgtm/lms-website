<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite LMS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1e3a8a,#9333ea);color:#111;display:flex}
.sidebar{width:260px;background:#111827;color:white;height:100vh;padding:20px;overflow:auto}
.sidebar button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#1f2937;color:white;cursor:pointer}
.sidebar button:hover{background:#374151}
.main{flex:1;padding:30px}
.card{background:white;padding:25px;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,0.15)}
button.primary{background:#22c55e;color:white;border:none;padding:12px;border-radius:8px;margin-top:15px;cursor:pointer}
button.primary:hover{background:#16a34a}
.hidden{display:none}
.progress{height:10px;background:#e5e7eb;border-radius:10px;margin:15px 0}
.bar{height:100%;width:0%;background:#22c55e;border-radius:10px}
</style>
</head>
<body>

<div class="sidebar hidden" id="sidebar">
<h3>Modules</h3>
<div id="chapterList"></div>
<button onclick="backToDashboard()">⬅ Back</button>
</div>

<div class="main">

<div class="card" id="loginPage">
<h2>Login</h2>
<input id="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0">
<input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0">
<button class="primary" onclick="login()">Login</button>
</div>

<div class="card hidden" id="dashboard">
<h2>Select Training</h2>
<button class="primary" onclick="startCourse('sales')">Sales Training</button>
<button class="primary" onclick="startCourse('dispatch')">Dispatch Training</button>
</div>

<div class="card hidden" id="coursePage">
<h2 id="title"></h2>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="content"></div>
<button class="primary" onclick="nextChapter()">Next</button>
<button class="primary" onclick="startQuiz()">Take Test</button>
</div>

<div class="card hidden" id="quizPage">
<h2>Quiz</h2>
<div id="quizBox"></div>
<button class="primary" onclick="submitQuiz()">Submit</button>
</div>

</div>

<script>

const courses={

sales:[
`<h3>Introduction to Sales</h3>
<p>Sales is the process of understanding customer needs and offering solutions that solve real problems. A professional salesperson does not push products but builds trust and value.</p>
<p>To succeed in sales, you must understand your product, your market, and your customer deeply.</p>
<p>Confidence, consistency, and communication are key skills.</p>
<p>Always focus on helping the customer instead of forcing a deal.</p>
<p>Sales is not luck; it is a skill developed through practice.</p>`,

`<h3>Customer Psychology</h3>
<p>Customers make decisions emotionally and justify them logically. Understanding this behavior is essential.</p>
<p>Fear of loss, desire for gain, and trust influence decisions.</p>
<p>Good salespeople identify pain points and offer clear solutions.</p>
<p>Building rapport increases conversion chances.</p>
<p>Always listen before speaking.</p>`,

`<h3>Cold Calling</h3>
<p>Cold calling means reaching out to potential clients who do not know you.</p>
<p>A strong opening is critical to grab attention.</p>
<p>Keep your message clear and valuable.</p>
<p>Confidence in voice creates trust.</p>
<p>Practice scripts but sound natural.</p>`
],

dispatch:[
`<h3>Introduction to Dispatch</h3>
<p>Dispatching is managing trucks, loads, and drivers in the logistics industry. A dispatcher connects brokers and carriers.</p>
<p>Carriers own trucks, brokers provide loads, shippers send goods, and receivers accept them.</p>
<p>A dispatcher ensures smooth operations and good profit.</p>
<p>Strong communication and planning are required.</p>
<p>This role requires focus and decision-making.</p>`,

`<h3>Load Boards</h3>
<p>Load boards like DAT are used to find loads.</p>
<p>Filter loads by location, type, and rate.</p>
<p>Always calculate RPM (rate per mile).</p>
<p>Call brokers professionally to book loads.</p>
<p>Confirm all details before dispatching.</p>`
]
};

const quizData={
sales:[
{q:"Sales is about?",o:["Solving problems","Forcing","Ignoring"],a:0},
{q:"Customers buy based on?",o:["Emotion","Nothing","Random"],a:0},
{q:"Cold calling means?",o:["New clients","Old","None"],a:0}
],

dispatch:[
{q:"Dispatch connects?",o:["Broker & carrier","Shop & home","None"],a:0},
{q:"RPM means?",o:["Rate per mile","Speed","Fuel"],a:0}
]
};

let currentCourse="";
let index=0;

function login(){loginPage.classList.add('hidden');dashboard.classList.remove('hidden');}

function startCourse(type){
currentCourse=type;index=0;
dashboard.classList.add('hidden');coursePage.classList.remove('hidden');sidebar.classList.remove('hidden');
renderSidebar();loadChapter();
}

function renderSidebar(){
let html="";
courses[currentCourse].forEach((c,i)=>{
html+=`<button onclick='goTo(${i})'>Module ${i+1}</button>`;
});
chapterList.innerHTML=html;
}

function loadChapter(){
content.innerHTML=courses[currentCourse][index];
title.innerText=currentCourse.toUpperCase()+" Module "+(index+1);
bar.style.width=((index+1)/courses[currentCourse].length*100)+"%";
}

function nextChapter(){if(index<courses[currentCourse].length-1){index++;loadChapter();}}
function goTo(i){index=i;loadChapter();}
function backToDashboard(){sidebar.classList.add('hidden');coursePage.classList.add('hidden');dashboard.classList.remove('hidden');}

function startQuiz(){
coursePage.classList.add('hidden');quizPage.classList.remove('hidden');
let html="";
quizData[currentCourse].forEach((q,i)=>{
html+=`<p>${q.q}</p>`;
q.o.forEach((opt,j)=>{html+=`<label><input type='radio' name='q${i}' value='${j}'> ${opt}</label><br>`;});
});
quizBox.innerHTML=html;
}

function submitQuiz(){
let score=0;
quizData[currentCourse].forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);
if(ans && parseInt(ans.value)===q.a){score++;}
});
alert("Score: "+score+"/"+quizData[currentCourse].length);
location.reload();
}

</script>

</body>
</html>
