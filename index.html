<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Final Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{max-width:900px;margin:auto;padding:20px;}
.card{background:#111827;padding:20px;border-radius:12px;margin-top:20px;}

input,button{
width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;
}

button{background:#3b82f6;color:white;cursor:pointer;}
button:hover{background:#2563eb;}

.hidden{display:none;}

.lesson{
background:#1f2937;
padding:10px;
margin:6px 0;
cursor:pointer;
border-radius:8px;
}

.lesson:hover{background:#374151;}

#videoModal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
}

.videoBox{
background:#111827;
padding:20px;
border-radius:10px;
width:90%;
max-width:700px;
}

iframe{
width:100%;
height:350px;
}
</style>
</head>

<body>

<div class="container" id="loginPage">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div class="container hidden" id="dashboard">
<div class="card">
<h2>Courses</h2>
<button onclick="openCourse('sales')">Sales Training</button>
<button onclick="openCourse('dispatch')">Dispatch Training</button>
</div>
</div>

<div class="container hidden" id="coursePage">
<div class="card">
<h2 id="courseTitle"></h2>
<div id="content"></div>
<button onclick="back()">Back</button>
</div>
</div>

<div id="videoModal" class="hidden" onclick="closeVideo()">
<div class="videoBox" onclick="event.stopPropagation()">
<h3 id="videoTitle"></h3>

<iframe id="videoFrame"
src=""
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen></iframe>

<button onclick="closeVideo()">Close</button>
</div>
</div>

<script>

const data = {
sales:[
{module:"Basics",lessons:[
{name:"Intro to Sales",video:"https://www.youtube.com/embed/ysz5S6PUM-U"},
{name:"Cold Calling",video:"https://www.youtube.com/embed/ysz5S6PUM-U"}
]},
{module:"Advanced",lessons:[
{name:"Closing Deals",video:"https://www.youtube.com/embed/ysz5S6PUM-U"},
{name:"Negotiation",video:"https://www.youtube.com/embed/ysz5S6PUM-U"}
]}
],

dispatch:[
{module:"Intro",lessons:[
{name:"Dispatch Intro",video:"https://www.youtube.com/embed/ysz5S6PUM-U"},
{name:"Load Boards",video:"https://www.youtube.com/embed/ysz5S6PUM-U"}
]},
{module:"Operations",lessons:[
{name:"Broker Calls",video:"https://www.youtube.com/embed/ysz5S6PUM-U"},
{name:"Rate Negotiation",video:"https://www.youtube.com/embed/ysz5S6PUM-U"}
]}
]
};

function login(){
loginPage.classList.add("hidden");
dashboard.classList.remove("hidden");
}

function openCourse(type){
coursePage.classList.remove("hidden");
dashboard.classList.add("hidden");

courseTitle.innerText = type.toUpperCase() + " COURSE";

let html = "";

data[type].forEach(m=>{
html += `<h3>${m.module}</h3>`;
m.lessons.forEach(l=>{
html += `<div class="lesson" onclick='openVideo("${l.name}","${l.video}")'>${l.name}</div>`;
});
});

content.innerHTML = html;
}

function back(){
coursePage.classList.add("hidden");
dashboard.classList.remove("hidden");
}

function openVideo(name, video){
videoModal.classList.remove("hidden");
videoTitle.innerText = name;

const frame = document.getElementById("videoFrame");
frame.src = "";
setTimeout(()=>{
frame.src = video;
},100);
}

function closeVideo(){
videoModal.classList.add("hidden");
videoFrame.src = "";
}

</script>

</body>
</html>
