<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f4f6f9;color:#1f2937;display:flex}
.sidebar{width:260px;background:#111827;color:white;height:100vh;padding:20px;overflow:auto}
.sidebar h3{margin-top:0}
.sidebar button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#1f2937;color:white;cursor:pointer;text-align:left}
.sidebar button:hover{background:#374151}
.main{flex:1;padding:30px}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.08)}
button.primary{background:#2563eb;color:white;border:none;padding:12px;border-radius:8px;margin-top:15px;cursor:pointer}
button.primary:hover{background:#1d4ed8}
.hidden{display:none}
.progress{height:8px;background:#e5e7eb;border-radius:10px;margin:15px 0}
.bar{height:100%;width:0%;background:#10b981;border-radius:10px}
</style>
</head>
<body>

<div class="sidebar hidden" id="sidebar">
<h3>Course Modules</h3>
<div id="chapterList"></div>
<button onclick="backToDashboard()">⬅ Back</button>
</div>

<div class="main">

<div class="card" id="loginPage">
<h2>Login</h2>
<input id="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0">
<input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0">
<button class="primary" onclick="login()">Login</button>
</div>

<div class="card hidden" id="dashboard">
<h2>Select Training</h2>
<button class="primary" onclick="startCourse('sales')">Sales Training</button>
<button class="primary" onclick="startCourse('dispatch')">Dispatch Training</button>
</div>

<div class="card hidden" id="coursePage">
<h2 id="title"></h2>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="content"></div>
<button class="primary" onclick="nextChapter()">Next</button>
<button class="primary" onclick="startQuiz()">Take Test</button>
</div>

<div class="card hidden" id="quizPage">
<h2>Quiz</h2>
<div id="quizBox"></div>
<button class="primary" onclick="submitQuiz()">Submit</button>
</div>

</div>

<script>

const courses={

dispatch:[
`<h3>Introduction to Dispatch</h3>
<p>Dispatching is the central coordination role in the trucking industry. A dispatcher acts as the bridge between carriers (truck owners/drivers) and brokers (who provide loads).</p>
<p>A carrier owns the truck and moves freight, while a broker connects shippers with carriers.</p>
<p>Shippers are companies that need goods transported, and receivers are the final destination.</p>
<p>A dispatcher ensures the driver gets consistent loads, good rates, and smooth routes.</p>
<p>Professional dispatchers maintain strong communication and manage time efficiently.</p>` ,

`<h3>Load Boards & Booking</h3>
<p>Load boards like DAT and Truckstop are platforms where brokers post loads.</p>
<p>Dispatchers search using filters like pickup, destination, and equipment type.</p>
<p>A good load has high RPM (rate per mile) and low deadhead miles.</p>
<p>To book a load, you call the broker using tools like Google Voice or RingCentral.</p>
<p>Always confirm rate, miles, and delivery time before booking.</p>` ,

`<h3>Deadhead & Miles</h3>
<p>Deadhead refers to empty miles traveled without a load.</p>
<p>Loaded miles are when the truck is carrying freight.</p>
<p>Negative deadhead means losing profit due to long empty travel.</p>
<p>ETA means Estimated Time of Arrival.</p>
<p>The best load balances high rate and low deadhead.</p>` ,

`<h3>Payments & Invoices</h3>
<p>After 7 days of work, dispatchers send invoices to carriers.</p>
<p>The agreed percentage or flat fee is deducted.</p>
<p>Payments can be made via Zelle, PayPal, or Cash App.</p>
<p>Always maintain clear records for trust and transparency.</p>` ,

`<h3>Freight Guard & Broker Credit</h3>
<p>Freight Guard shows complaints or reports about brokers.</p>
<p>Always check broker credit score before booking loads.</p>
<p>Negotiate confidently to get better rates.</p>
<p>A perfect deal balances good rate, safe broker, and good route.</p>` ,

`<h3>Important Documents</h3>
<p>TONU means Truck Order Not Used (cancellation fee).</p>
<p>COI is Certificate of Insurance.</p>
<p>W9 Form is used for tax identification.</p>
<p>MC Authority proves carrier is authorized.</p>
<p>Void check is used for payment setup.</p>` ,

`<h3>Truck Types</h3>
<p>Common types include Reefer, Flatbed, Step Deck, Dry Van, and Box Truck.</p>
<p>Each has different capacity and RPM rates.</p>
<p>Choosing the right load depends on truck type.</p>` ,

`<h3>Documents in Delivery</h3>
<p>POD (Proof of Delivery) confirms shipment delivered.</p>
<p>BOL (Bill of Lading) contains shipment details.</p>
<p>Rate Confirmation shows agreed payment.</p>`
],

sales:[
`<h3>Introduction to Sales</h3>
<p>Sales is about solving customer problems and delivering value.</p>
<p>Trust is the foundation of every successful sale.</p>
<p>A good salesperson listens more than speaks.</p>
<p>Understanding the product deeply is essential.</p>
<p>Consistency and confidence lead to results.</p>` ,

`<h3>Customer Psychology</h3>
<p>Customers buy emotionally and justify logically.</p>
<p>Understanding pain points is critical.</p>
<p>People prefer trust over price.</p>
<p>Building rapport increases conversion rate.</p>` ,

`<h3>Communication Skills</h3>
<p>Clear and confident communication is key.</p>
<p>Use simple language and avoid confusion.</p>
<p>Active listening builds trust.</p>` ,

`<h3>Cold Calling</h3>
<p>Cold calling means contacting new prospects.</p>
<p>A strong opening grabs attention.</p>
<p>Confidence and tone matter more than script.</p>` ,

`<h3>Handling Objections</h3>
<p>Objections are normal in sales.</p>
<p>Stay calm and respond logically.</p>
<p>Common objections include price and trust.</p>` ,

`<h3>Closing Techniques</h3>
<p>Closing is finalizing the deal.</p>
<p>Create urgency and clarity.</p>
<p>Guide the customer toward decision.</p>` ,

`<h3>Follow Up</h3>
<p>Most sales happen after follow-ups.</p>
<p>Stay consistent and professional.</p>` ,

`<h3>Professional Growth</h3>
<p>Practice improves sales skills.</p>
<p>Track performance and improve daily.</p>`
]
};

let currentCourse="";
let index=0;

function login(){
loginPage.classList.add('hidden');
dashboard.classList.remove('hidden');
}

function startCourse(type){
currentCourse=type;
index=0;
dashboard.classList.add('hidden');
coursePage.classList.remove('hidden');
sidebar.classList.remove('hidden');
renderSidebar();
loadChapter();
}

function renderSidebar(){
let html="";
courses[currentCourse].forEach((c,i)=>{
html+=`<button onclick='goTo(${i})'>Module ${i+1}</button>`;
});
chapterList.innerHTML=html;
}

function loadChapter(){
content.innerHTML=courses[currentCourse][index];
title.innerText=currentCourse.toUpperCase()+" (Module "+(index+1)+")";
bar.style.width=((index+1)/courses[currentCourse].length*100)+"%";
}

function nextChapter(){
if(index<courses[currentCourse].length-1){index++;loadChapter();}
}

function goTo(i){index=i;loadChapter();}

function backToDashboard(){
sidebar.classList.add('hidden');
coursePage.classList.add('hidden');
dashboard.classList.remove('hidden');
}

function startQuiz(){
coursePage.classList.add('hidden');
quizPage.classList.remove('hidden');
quizBox.innerHTML="<p>Quiz coming soon (you can expand this next)</p>";
}

</script>

</body>
</html>
