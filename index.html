<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextGen LMS - Live System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<style>
body{margin:0;font-family:'Outfit',sans-serif;background:#0b1220;color:#e2e8f0}
.header{padding:15px 30px;background:#020617}
.container{display:flex}
.sidebar{width:250px;background:#020617;height:100vh;padding:20px}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:#1e293b;color:white;border:none;border-radius:8px}
.main{flex:1;padding:30px}
.card{background:#020617;padding:25px;border-radius:14px}
button{cursor:pointer}
.primary{background:#38bdf8;color:black;padding:10px;border:none;border-radius:8px}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">🚀 LMS Live System</div>

<div id="loginPage" class="main">
<div class="card">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="primary" onclick="signup()">Signup</button>
<button class="primary" onclick="login()">Login</button>
</div>
</div>

<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<h3>Modules</h3>
<div id="modules"></div>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<div id="home" class="card">
<h2>Select Course</h2>
<button onclick="loadCourse('sales')">Sales</button>
<button onclick="loadCourse('dispatch')">Dispatch</button>
</div>

<div id="content" class="card hidden"></div>
<div id="quiz" class="card hidden"></div>
</div>

</div>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAAFMAkHYvqGvaBXihNZ69b2I9oOr9zp-A",
  authDomain: "elite-lms-eedd6.firebaseapp.com",
  projectId: "elite-lms-eedd6",
  storageBucket: "elite-lms-eedd6.firebasestorage.app",
  messagingSenderId: "800531358013",
  appId: "1:800531358013:web:d3ebf1cb0fba4a09b2a554"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function signup(){
let email=document.getElementById('email').value;
let pass=document.getElementById('pass').value;
auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert('Signup Success'))
.catch(e=>alert(e.message));
}

function login(){
let email=document.getElementById('email').value;
let pass=document.getElementById('pass').value;
auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
loginPage.style.display='none';
app.classList.remove('hidden');
})
.catch(e=>alert(e.message));
}

function logout(){auth.signOut();location.reload();}

const courses={
sales:["Sales basics full training content here...","Closing strategies..."],
dispatch:["Dispatch workflow full training...","Load booking system..."]
};

let current="";

function loadCourse(type){
current=type;
home.classList.add('hidden');
content.classList.remove('hidden');
renderModules();
show(0);
}

function renderModules(){
let html="";
courses[current].forEach((_,i)=>{
html+=`<button onclick='show(${i})'>Module ${i+1}</button>`;
});
html+=`<button onclick='saveProgress()'>Save Progress</button>`;
html+=`<button onclick='generateCertificate()'>Get Certificate</button>`;
modules.innerHTML=html;
}

function show(i){content.innerHTML=courses[current][i];}

function saveProgress(){
let user=auth.currentUser;
db.collection("progress").doc(user.uid).set({course:current})
.then(()=>alert('Progress Saved'));
}

function generateCertificate(){
let user=auth.currentUser;
let name=user.email;
let win=window.open();
win.document.write(`<h1>Certificate</h1><p>This certifies ${name} completed ${current} training</p>`);
}

</script>

</body>
</html>
