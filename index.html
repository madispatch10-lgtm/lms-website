<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro LMS Advanced</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#111827);
color:#e5e7eb;
}

.topbar{
background:#0b1220;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin:10px 0;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
font-size:14px;
}

input,select{
background:#0b1220;
color:white;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#2563eb;}

.hidden{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.courseBox{
background:#0b1220;
padding:15px;
border-radius:12px;
cursor:pointer;
}

.courseBox:hover{background:#1f2937;}

.lesson{
background:#0b1220;
padding:12px;
margin:8px 0;
border-radius:10px;
}

.progressBar{
height:10px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin:10px 0;
}

.progress{
height:100%;
width:0%;
background:#22c55e;
}

.video{
background:#0b1220;
padding:12px;
border-radius:10px;
margin:8px 0;
}

.badge{
background:#22c55e;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}
</style>
</head>
<body>

<div class="topbar">
<h2>🚀 Pro LMS Advanced</h2>
<span id="userStatus">Not Logged In</span>
</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<div class="card">
<h2>Login / Register</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardPage">
<div class="card">
<h2>Dashboard</h2>
<div class="progressBar"><div class="progress" id="progress"></div></div>
<p>Course Progress</p>

<div class="grid">
<div class="courseBox" onclick="openCourse('sales')">
<h3>Sales Training</h3>
<p>Learn sales skills</p>
</div>
<div class="courseBox" onclick="openCourse('dispatch')">
<h3>Dispatch Training</h3>
<p>Learn logistics dispatch</p>
</div>
</div>

<button onclick="logout()" style="background:#ef4444">Logout</button>
</div>
</div>

<!-- COURSE PAGE -->
<div class="container hidden" id="coursePage">
<div class="card">
<h2 id="courseTitle">Course</h2>
<div id="videos"></div>
<div id="lessons"></div>

<button onclick="completeLesson()">Mark Progress</button>
<button onclick="certificate()" style="background:#22c55e">Get Certificate</button>
<button onclick="backDashboard()">Back</button>
</div>
</div>

<!-- CERTIFICATE -->
<div class="container hidden" id="certPage">
<div class="card">
<h2>🎓 Certificate</h2>
<p id="certText"></p>
<button onclick="backDashboard()">Back</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyB3kxO-o65YpZGeLRP-sF_m8BR9rt6lkz8",
authDomain:"lms-training-7bb26.firebaseapp.com",
projectId:"lms-training-7bb26",
storageBucket:"lms-training-7bb26.firebasestorage.app",
messagingSenderId:"791631109001",
appId:"1:791631109001:web:f5d7fc5c2755ae01649f58"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

let currentUser=null;
let progress=0;
let currentCourse="";

const courses={
sales:{
videos:["Intro Video","Sales Mindset","Closing Techniques"],
lessons:["Cold Calling","Lead Handling","Closing Deals"]
},
dispatch:{
videos:["Dispatch Intro","Load Board","Broker Calls"],
lessons:["Load Booking","Rate Negotiation","Carrier Management"]
}
};

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
alert("Registered");
};

window.login=async()=>{
const res=await signInWithEmailAndPassword(auth,email.value,password.value);
currentUser=res.user;
loginPage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
userStatus.innerText=email.value;
};

window.logout=async()=>{await signOut(auth);location.reload();};

window.openCourse=(type)=>{
currentCourse=type;
dashboardPage.classList.add("hidden");
coursePage.classList.remove("hidden");

courseTitle.innerText=type.toUpperCase()+" COURSE";

videos.innerHTML=courses[type].videos.map(v=>`<div class='video'>🎥 ${v}</div>`).join("");
lessons.innerHTML=courses[type].lessons.map(l=>`<div class='lesson'>📘 ${l}</div>`).join("");
};

window.completeLesson=()=>{
progress+=20;
if(progress>100)progress=100;
document.getElementById("progress").style.width=progress+"%";
alert("Progress Updated");
};

window.certificate=()=>{
certPage.classList.remove("hidden");
coursePage.classList.add("hidden");
certText.innerText=`Congrats ${currentUser.email}, you completed ${currentCourse} course!`;
};

window.backDashboard=()=>{
certPage.classList.add("hidden");
coursePage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
};
</script>

</body>
</html>
