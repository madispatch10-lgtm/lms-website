<!DOCTYPE html>
<html>
<head>
<title>Ultimate LMS</title>
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex}
.sidebar{width:250px;background:#111827;height:100vh;padding:20px;overflow:auto}
.sidebar h3{margin-top:0}
.sidebar button{width:100%;margin:5px 0;padding:10px;border:none;border-radius:6px;background:#1f2937;color:white;cursor:pointer}
.sidebar button:hover{background:#374151}
.main{flex:1;padding:20px}
.card{background:#111827;padding:20px;border-radius:10px}
CSS mein add karo:

button.primary{
background:#3b82f6;
border:none;
padding:12px;
border-radius:8px;
color:white;
font-weight:bold;
}

button.primary:hover{
background:#2563eb;
}
.progress{height:8px;background:#1f2937;border-radius:10px;margin:10px 0}
.bar{height:100%;width:0%;background:#22c55e;border-radius:10px}
</style>
</head>
<body>

<div class="sidebar hidden" id="sidebar">
<h3>Chapters</h3>
<div id="chapterList"></div>
<button onclick="goDashboard()">⬅ Back</button>
</div>

<div class="main">

<div class="card" id="login">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="primary" onclick="loginUser()">Login</button>
</div>

<div class="card hidden" id="dashboard">
<h2>Select Course</h2>
<button class="primary" onclick="startCourse('sales')">Sales Training</button>
<button class="primary" onclick="startCourse('dispatch')">Dispatch Training</button>
</div>

<div class="card hidden" id="course">
<h2 id="title"></h2>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="content"></div>
<button class="primary" onclick="nextChapter()">Next</button>
<button class="primary" onclick="startQuiz()">Take Test</button>
</div>

<div class="card hidden" id="quiz">
<h2>Quiz</h2>
<div id="qbox"></div>
<button class="primary" onclick="submitQuiz()">Submit</button>
</div>

<div class="card hidden" id="certificate">
<h2>🎓 Certificate</h2>
<p id="certText"></p>
</div>

</div>

<script>

const courses={
sales:[
"<h3>Intro</h3><p>Sales is about solving customer problems and building trust.</p>",
"<h3>Psychology</h3><p>Understand emotions, pain points, and buying triggers.</p>",
"<h3>Communication</h3><p>Clear, confident, and focused communication wins deals.</p>",
"<h3>Cold Calling</h3><p>Reach new clients with strong openings.</p>",
"<h3>Objections</h3><p>Handle price and trust concerns professionally.</p>",
"<h3>Closing</h3><p>Convert leads into customers.</p>",
"<h3>Follow Up</h3><p>Consistency closes deals.</p>"
],

dispatch: [
`<h3>Chapter 1: Introduction to Dispatch</h3>
<p>Dispatching is the backbone of the trucking industry. A dispatcher connects drivers with loads and ensures smooth operations.</p>
<p>Your role includes communication, planning, and problem solving.</p>`,

`<h3>Chapter 2: Load Boards (Detailed)</h3>
<p>Load boards like DAT and Truckstop are platforms where brokers post loads.</p>
<p>You must filter loads based on location, rate, distance, and equipment type.</p>
<p>Always check RPM (rate per mile) before booking.</p>
<p>Never accept low-paying loads without negotiation.</p>`,

`<h3>Chapter 3: Broker Communication</h3>
<p>Communication must be professional and confident.</p>
<p>Introduce yourself clearly and ask direct questions about the load.</p>
<p>Example: pickup location, delivery time, rate, and special requirements.</p>`,

`<h3>Chapter 4: Rate Negotiation</h3>
<p>Never accept the first rate. Always negotiate.</p>
<p>Use market knowledge and confidence.</p>
<p>Say: \"Can you do better on this rate?\"</p>`,

`<h3>Chapter 5: Trip Planning</h3>
<p>Plan routes smartly to save fuel and time.</p>
<p>Avoid dead miles and delays.</p>
<p>Use maps and tracking tools.</p>`,

`<h3>Chapter 6: Documentation</h3>
<p>Important documents include BOL (Bill of Lading) and Rate Confirmation.</p>
<p>Always verify details before dispatching.</p>`,

`<h3>Chapter 7: Problem Handling</h3>
<p>Issues like delays, breakdowns, and cancellations are common.</p>
<p>Stay calm and solve problems quickly.</p>
<p>Always inform broker and driver.</p>`
]
};

const quizData={
sales:[{q:"Sales means?",o:["Solve problems","Force","Ignore"],a:0}],
dispatch:[{q:"Dispatch means?",o:["Manage trucks","Cook","Game"],a:0}]
};

let currentCourse="";
let index=0;
let progress=0;

function loginUser(){
login.classList.add('hidden');
dashboard.classList.remove('hidden');
}

function startCourse(type){
currentCourse=type;
index=0;
progress=0;
dashboard.classList.add('hidden');
course.classList.remove('hidden');
sidebar.classList.remove('hidden');
title.innerText=type.toUpperCase()+" COURSE";
renderSidebar();
loadChapter();
}

function renderSidebar(){
let html="";
courses[currentCourse].forEach((c,i)=>{
html+=`<button onclick='goTo(${i})'>Chapter ${i+1}</button>`;
});
chapterList.innerHTML=html;
}

function loadChapter(){
content.innerHTML=courses[currentCourse][index];
progress=(index+1)/courses[currentCourse].length*100;
bar.style.width=progress+"%";
}

function nextChapter(){
if(index<courses[currentCourse].length-1){index++;loadChapter();}
}

function goTo(i){index=i;loadChapter();}

function goDashboard(){
sidebar.classList.add('hidden');
course.classList.add('hidden');
dashboard.classList.remove('hidden');
}

function startQuiz(){
course.classList.add('hidden');
quiz.classList.remove('hidden');
let html="";
quizData[currentCourse].forEach((q,i)=>{
html+=`<p>${q.q}</p>`;
q.o.forEach((opt,j)=>{
html+=`<label><input type='radio' name='q${i}' value='${j}'> ${opt}</label><br>`;
});
});
qbox.innerHTML=html;
}

function submitQuiz(){
certificate.classList.remove('hidden');
quiz.classList.add('hidden');
certText.innerText="Congratulations! You completed the course.";
}

</script>

</body>
</html>
